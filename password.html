<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mynds — Acesso Restrito</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/password.css" />
</head>

<body class="password-page">

  <!-- GRID BG -->
  <div class="grid-bg"></div>

  <!-- LOCK CONTAINER -->
  <main class="lock-container">

    <div class="lock-header">
      <div class="lock-icon">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="5" y="11" width="14" height="10" rx="2" stroke="#ff2d78" stroke-width="1.5" />
          <path d="M8 11V7a4 4 0 0 1 8 0v4" stroke="#ff2d78" stroke-width="1.5" stroke-linecap="round" />
          <circle cx="12" cy="16" r="1.5" fill="#ff2d78" />
        </svg>
      </div>
      <p class="lock-label">ACESSO RESTRITO</p>
      <p class="lock-sublabel">Insira o código secreto</p>
    </div>

    <div class="input-group">
      <label for="password-input" class="input-label">CÓDIGO SECRETO</label>
      <div class="input-wrap" id="input-wrap">
        <input type="password" id="password-input" class="password-input" placeholder="••••••••" autocomplete="off"
          spellcheck="false" onkeydown="handleKey(event)" />
        <button class="toggle-vis" onclick="toggleVisibility()" title="Mostrar/ocultar senha">
          <svg id="eye-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z" stroke="currentColor" stroke-width="1.5" />
            <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.5" />
          </svg>
        </button>
      </div>
      <div class="error-msg" id="error-msg">
        <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="8" cy="8" r="7" stroke="#ff2d78" stroke-width="1.2" />
          <path d="M8 4.5v4" stroke="#ff2d78" stroke-width="1.5" stroke-linecap="round" />
          <circle cx="8" cy="11" r="0.8" fill="#ff2d78" />
        </svg>
        Senha incorreta. Tente novamente.
      </div>
    </div>

    <button class="submit-btn" id="submit-btn" onclick="checkPassword()">
      <span id="btn-text">ENTRAR</span>
      <div class="btn-loader" id="btn-loader"></div>
    </button>

    <a href="index.html" class="back-link">← Voltar</a>

  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="footer-inner">
      <span class="footer-logo-text">MYNDS<sup>®</sup></span>
    </div>
  </footer>

  <script src="js/password.js"></script>
</body>

</html>
